services:
  backend:
    build:
      context: ./backend
    container_name: budget-tracker-backend
    environment:
      NODE_ENV: production
      PORT: 5001
      DB_FILE: /app/data/budget.sqlite
      EXCHANGE_GBP_TO_INR: ${EXCHANGE_GBP_TO_INR:-120}
      CORS_ORIGIN: ${CORS_ORIGIN:-https://hodimoit.co.uk}
    expose:
      - "5001"
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:5001/api/health').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  web:
    build:
      context: .
      dockerfile: frontend/Dockerfile.prod
    container_name: budget-tracker-web
    environment:
      APP_DOMAIN: ${APP_DOMAIN:-hodimoit.co.uk}
      ACME_EMAIL: ${ACME_EMAIL:-admin@hodimoit.co.uk}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
